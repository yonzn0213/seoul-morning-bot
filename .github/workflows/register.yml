name: 유저 등록 처리

on:
  schedule:
    # 10분마다 새 메시지 폴링 (public 저장소는 Actions 무료 무제한)
    # private 저장소로 쓸 경우 월 2,000분 한도 때문에 "*/30 * * * *" 권장
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # 수동 실행(즉시 처리하고 싶을 때)

# 동시 실행으로 state.json 커밋이 충돌하지 않게
concurrency:
  group: bot-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process updates
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python register.py

      - name: Commit state
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || (git commit -m "chore: update user state" && git push)
